# Debug Launch: manifest containing invalid debug entries.
#
# This manifest exercises two categories of failures:
#   1. Legacy top-level `debug` section → hard-cutover rejection
#   2. Component-scoped debug entries with validation errors
#
# The manifest has valid models, targets and components but debug entries
# that have various validation errors.  The manifest loads with status
# "loaded" (structural fields are valid) but hasDebugBlockingIssues is true
# and validation issues are reported for each invalid debug profile.

models:
  - id: T2T1
    name: Trezor Model T (v1)
    artifactFolder: model-t
  - id: T3W1
    name: Trezor Model T3 (w1)
    artifactFolder: model-t3

targets:
  - id: hw
    name: Hardware
    shortName: HW
  - id: emu
    name: Emulator

components:
  - id: core
    name: Core
    artifactName: compile_commands_core
    debug:
      # invalid: missing required "name" field
      - template: gdb-remote.json

      # invalid: missing required "template" field
      - name: GDB Remote

      # invalid: bad "when" expression (unknown function name)
      - name: GDB Remote (bad-when)
        template: gdb-remote.json
        when: "unknownFunc(T2T1)"

      # invalid: "when" expression references unknown model id
      - name: GDB Remote (unknown-id)
        template: gdb-remote.json
        when: "model(UNKNOWN_MODEL)"
