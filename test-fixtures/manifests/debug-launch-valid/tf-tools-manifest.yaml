# Debug Launch: valid manifest with debug profiles covering various resolution scenarios.
#
# Active context → debug resolution outcome:
#   T2T1 :: hw  :: *          → profile-a (priority 10), unique
#   T2T1 :: emu :: *          → profile-a (priority 10) AND profile-b (priority 5)
#                                → profile-a wins (highest priority), unique
#   T3W1 :: hw  :: *          → profile-c (priority 10) AND profile-d (priority 10)
#                                → AMBIGUOUS (tied highest priority)
#   T3W1 :: emu :: *          → no match
#   *    :: *   :: prodtest   → profile-e (priority 20) + any context-specific profiles
#                                → profile-e wins when priority > others, unique for T2T1/T3W1 emu
#   T2T1 :: hw  :: prodtest   → profile-a (10) AND profile-e (20) → profile-e wins (unique)
#   T3W1 :: hw  :: prodtest   → profile-c (10) AND profile-d (10) AND profile-e (20)
#                                → profile-e wins (unique, highest priority)

models:
  - id: T2T1
    name: Trezor Model T (v1)
    artifactFolder: model-t
  - id: T3W1
    name: Trezor Model T3 (w1)
    artifactFolder: model-t3

targets:
  - id: hw
    name: Hardware
    shortName: HW
  - id: emu
    name: Emulator
    artifactSuffix: _emu

components:
  - id: core
    name: Core
    artifactName: compile_commands_core
  - id: prodtest
    name: Prodtest
    artifactName: compile_commands_prodtest

debug:
  # profile-a: matches any T2T1 context, priority 10
  - when: model(T2T1)
    priority: 10
    template: gdb-remote.json
    executable: firmware.elf

  # profile-b: matches T2T1 emulator specifically, lower priority (profile-a wins)
  - when: all(model(T2T1), target(emu))
    priority: 5
    template: emu-debug.json
    executable: firmware_emu.elf

  # profile-c: matches T3W1 hw context, priority 10 (tied with profile-d → ambiguous)
  - when: all(model(T3W1), target(hw))
    priority: 10
    template: gdb-hw-t3.json
    executable: firmware_t3_hw.elf

  # profile-d: also matches T3W1 hw context, same priority as profile-c → ambiguous
  - when: all(model(T3W1), target(hw))
    priority: 10
    template: gdb-hw-t3-alt.json
    executable: firmware_t3_hw_alt.elf

  # profile-e: matches prodtest component, highest priority with vars
  - when: component(prodtest)
    priority: 20
    template: prodtest-debug.json
    executable: prodtest.elf
    vars:
      debugPort: "3333"
      programArgs: "--model ${tfTools.model} --port ${tfTools.debugPort}"
