# Manifest fixture: grouped and ungrouped build options.
# Used by US1 tests to verify declaration-order rendering, grouping,
# checkbox/multistate handling, and when-expression gating.

models:
  - id: T2T1
    name: Trezor Model T (v1)
  - id: T3W1
    name: Trezor Model T3 (w1)

targets:
  - id: hw
    name: Hardware
    shortName: HW
  - id: emu
    name: Emulator

components:
  - id: core
    name: Core
  - id: prodtest
    name: Prodtest

options:
  # Ungrouped checkbox option – always available
  - name: "Debug Build"
    flag: "--debug"
    type: checkbox

  # Group: Build Tuning
  - name: "Fast"
    flag: "--fast"
    type: checkbox
    group: "Build Tuning"

  - name: "Optimize"
    flag: "--optimize"
    type: checkbox
    group: "Build Tuning"

  # Group: Feature Flags
  - name: "Experimental"
    flag: "--experimental"
    type: checkbox
    group: "Feature Flags"
    when: "model(T3W1)"

  # Ungrouped multistate option – available only for hardware target
  - name: "Verbosity"
    flag: "--verbose"
    type: multistate
    when: "target(hw)"
    states:
      - value: null
        name: "Off"
      - value: normal
        name: "Normal"
      - value: high
        name: "High"

  # Group: Build Tuning (same group, later in file – still merges under first occurrence)
  - name: "Strict"
    flag: "--strict"
    type: checkbox
    group: "Build Tuning"
