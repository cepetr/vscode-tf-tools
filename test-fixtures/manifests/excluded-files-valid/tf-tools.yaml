# compile-commands artifact while exercising the excluded-files matching rules.
#
# Artifact path formula: <artifactsRoot>/<artifactFolder>/<artifactName><artifactSuffix>.cc.json

models:
  - id: T2T1
    name: Trezor Model T (v1)
    artifactFolder: model-t
  - id: T3W1
    name: Trezor Model T3 (w1)
    artifactFolder: model-t3

targets:
  - id: hw
    name: Hardware
    shortName: HW
  - id: emu
    name: Emulator
    artifactSuffix: _emu

components:
  - id: core
    name: Core
    artifactName: compile_commands_core
