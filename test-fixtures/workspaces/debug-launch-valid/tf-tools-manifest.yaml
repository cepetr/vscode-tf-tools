models:
  - id: T2T1
    name: Trezor Model T (v1)
    artifactFolder: model-t
  - id: T3W1
    name: Trezor Model T3 (w1)
    artifactFolder: model-t3

targets:
  - id: hw
    name: Hardware
    shortName: HW
    executableExtension: ".elf"
  - id: emu
    name: Emulator
    artifactSuffix: _emu
    executableExtension: ".elf"

components:
  # Single-profile component: one entry always matches
  - id: core
    name: Core
    artifactName: compile_commands_core
    debug:
      - name: GDB Remote
        template: gdb-remote.json
        when: model(T2T1)
        vars:
          port: "3333"
  # Multi-profile component: multiple entries match T2T1+hw for US2 testing
  - id: prodtest
    name: Prodtest
    artifactName: compile_commands_prodtest
    debug:
      # entry[0]: matches T2T1 model (default for T2T1+hw, T2T1+emu)
      - name: GDB Remote (T2T1)
        template: gdb-remote.json
        when: model(T2T1)
      # entry[1]: matches hw target (matches T2T1+hw, T3W1+hw)
      - name: GDB Remote (HW)
        template: gdb-remote.json
        when: target(hw)
      # entry[2]: no when – always matches
      - name: GDB Remote (any)
        template: gdb-remote.json
