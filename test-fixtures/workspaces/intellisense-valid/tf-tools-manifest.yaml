# IntelliSense manifest fixture: valid configuration with artifact metadata.
# Provides models with artifactFolder, components with artifactName,
# and targets with and without artifactSuffix.
# Artifact path formula: <artifactsRoot>/<artifactFolder>/<artifactName><artifactSuffix>.cc.json

models:
  - id: T2T1
    name: Trezor Model T (v1)
    artifactFolder: model-t
  - id: T3W1
    name: Trezor Model T3 (w1)
    artifactFolder: model-t3

targets:
  - id: hw
    name: Hardware
    shortName: HW
  - id: emu
    name: Emulator
    artifactSuffix: _emu

components:
  - id: core
    name: Core
    artifactName: compile_commands_core
  - id: prodtest
    name: Prodtest
    artifactName: compile_commands_prodtest
