models:
  - id: T2T1
    name: Trezor Model T (v1)
    artifactFolder: model-t
  - id: T3W1
    name: Trezor Model T3 (w1)
    artifactFolder: model-t3

targets:
  - id: hw
    name: Hardware
    shortName: HW
  - id: emu
    name: Emulator

components:
  - id: core
    name: Core
    artifactName: compile_commands_core

debug:
  - when: all(model(T2T1), target(hw), component(core))
    priority: 10
    template: missing-template.json
    executable: firmware_missing.elf

  - when: all(model(T2T1), target(emu), component(core))
    priority: 10
    template: malformed-template.json
    executable: firmware_malformed.elf

  - when: all(model(T3W1), target(hw), component(core))
    priority: 10
    template: unknown-var-template.json
    executable: firmware_unknown.elf
