name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@v5
    - name: Install Node.js
      uses: actions/setup-node@v5
      with:
        node-version: 24.x
        cache: npm
    - run: npm ci
    - run: xvfb-run -a npm test
      if: runner.os == 'Linux'
    - run: npm test
      if: runner.os != 'Linux'

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v5
    - name: Install Node.js
      uses: actions/setup-node@v5
      with:
        node-version: 24.x
        cache: npm
    - run: npm ci
    - name: Package extension
      run: npm run package
    - name: Publish GitHub release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: gh release create "$GITHUB_REF_NAME" ./*.vsix --generate-notes --title "$GITHUB_REF_NAME"
